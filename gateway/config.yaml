binds:
- port: 3000
  listeners:
  - routes:
    - backends:
      - mcp:
          targets:
          - name: reelm_torrents
            mcp:
              host: http://reelm-transmission:8000/mcp/
          - name: reelm_search
            mcp:
              host: http://reelm-jackett:8000/mcp/
          - name: reelm_storage
            mcp:
              host: http://reelm-storage:8000/mcp/
      matches:
      - path:
          exact: /mcp
      - path:
          exact: /.well-known/oauth-protected-resource/mcp
      policies:
        cors:
          allowOrigins: ["*"]
          allowHeaders: ["*"]
          exposeHeaders: ["Mcp-Session-Id"]
        mcpAuthentication:
          mode: strict
          issuer: https://accounts.google.com/
          audiences:
          - 230381969946-tl8m06vb6kpqsmnf3o2g2lv9j0pv6753.apps.googleusercontent.com
          jwks:
            url: https://www.googleapis.com/oauth2/v3/certs
          resourceMetadata:
            resource: https://reelm.shen.iorlas.net/mcp
            bearerMethodsSupported:
            - header
